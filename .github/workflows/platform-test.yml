name: Platform Test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unix-build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
          - os: ubuntu-latest
            compiler: clang
            cc: clang
          - os: macos-latest
            compiler: clang
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ${{ matrix.cc }} -Wall -Wextra hp_palloc.c hpool.c -o hpool

      - name: Run demo
        run: ./hpool